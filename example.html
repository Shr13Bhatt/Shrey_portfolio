<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scroll to Section</title>
<style>
    /* Some basic styling */
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        scroll-behavior: smooth; /* Enable smooth scrolling */
    }
    section {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    #about {
        background-color: lightblue;
    }
    #services {
        background-color: lightgreen;
    }
    #contact {
        background-color: lightcoral;
    }
    button {
        position: fixed;
        top: 20px;
        right: 20px;
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
    }
</style>
</head>
<body>

<section id="about">
    <h2>About Section</h2>
    <p>This is the About section.</p>
</section>

<section id="services">
    <h2>Services Section</h2>
    <p>This is the Services section.</p>
</section>

<section id="contact">
    <h2>Contact Section</h2>
    <p>This is the Contact section.</p>
</section>

<!-- Button to scroll to the About section -->
<button onclick="document.getElementById('about').scrollIntoView()">Scroll to About Section</button>

</body>
</html>
